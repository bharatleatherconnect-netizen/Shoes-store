<!DOCTYPE html>
<html>
<head>
  <title>My Shoe Store</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .container { width: 80%; margin: auto; }
    .product { background:white; padding:15px; margin:10px; display:inline-block; }
    button { background:black; color:white; padding:10px; border:none; }
  </style>
</head>
<body>

<div class="container">
  <h1>Bharat Leather Connect</h1>

  <div class="product">
    <h2>Leather Formal Shoes</h2>
    <p>999</p>
    <button onclick="addToCart(' Mans formal leather shoes')">Add to Cart</button>
  </div>

  <div class="product">
    <h2>Leather Formal Shoes</h2>
    <p>₹990</p>
    <button onclick="addToCart('Adidas Shoes')">Add to Cart</button>
  </div>

  <h2>Cart:</h2>
  <ul id="cart"></ul>
</div>

<script>
  let cart = [];

  function addToCart(product) {
    cart.push(product);
    displayCart();
  }

  function displayCart() {
    let cartList = document.getElementById("cart");
    cartList.innerHTML = "";

    cart.forEach(item => {
      let li = document.createElement("li");
      li.innerText = item;	
      cartList.appendChild(li);
    });
  }
</script>

</body>
</html>
